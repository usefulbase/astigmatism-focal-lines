<script>
const svg=document.querySelector('#svg'),h=document.querySelector('#hRange'),v=document.querySelector('#vRange'),s=document.querySelector('#sphereRange'),zoom=document.querySelector('#zoomRange'),H=document.querySelector('#focusH'),V=document.querySelector('#focusV'),least=document.querySelector('#leastCircle'),retinalFocus=document.querySelector('#retinalFocus'),ticks=document.querySelector('#ticks'),scS=document.querySelector('#scS'),scC=document.querySelector('#scC'),scA=document.querySelector('#scA'),jccPower=document.querySelector('#jccPower'),jccOut=document.querySelector('#jccOut'),jccMiniH=document.querySelector('#jccMiniH'),jccMiniV=document.querySelector('#jccMiniV'),correctionOut=document.querySelector('#correctionOut'),jccPanel=document.querySelector('#jccPanel'),jccToggle=document.querySelector('#jccToggle'),directToggle=document.querySelector('#directToggle'),directControls=document.querySelector('#directControls'),trialLens=document.querySelector('#trialLens'),sphereLens=document.querySelector('#sphereLens'),jccLens=document.querySelector('#jccLens'),jccFront=document.querySelector('#jccFront'),jccLensHandle=document.querySelector('#jccLensHandle'),jccFrontHandle=document.querySelector('#jccFrontHandle');let dragging=null,scaxAxis='180',jcc=0,lensS=0,lensC=0;
const retinaX=605,scale=30,xFor=d=>retinaX+d*scale,dText=d=>`${d>0?'+':''}${(+d).toFixed(2)} D`;
function makeTicks(){let out='';for(let d=-5;d<=5.001;d+=.25){const x=xFor(d),half=Math.abs(d*2-Math.round(d*2))<.01,whole=Math.abs(d-Math.round(d))<.01,zero=Math.abs(d)<.01,tickClass=whole?'whole':half?'half':'tick',end=whole?254:half?247:236;out+=`<g transform="translate(${x} 0)"><line x1="0" x2="0" y1="${zero?214:222}" y2="${end}" class="${tickClass}"/>`;if(whole&&!zero)out+=`<rect x="-13" y="262" width="26" height="18" rx="5" fill="#eef0f1"/><text x="0" y="275" text-anchor="middle" class="tick-label">${Math.abs(d)}</text>`;if(zero)out+=`<rect x="-20" y="260" width="40" height="20" rx="10" fill="#444d52"/><text x="0" y="274" text-anchor="middle" class="zero-label">0 D</text>`;out+='</g>'}ticks.innerHTML=out}
function vals(){return {hd:-(+h.value)-(+s.value),vd:-(+v.value)-(+s.value)}}
const scText=value=>`${value>0?'+':''}${value.toFixed(2)}`;
const quarter=value=>Math.round(value*4)/4;
function fillQuarterOptions(select,min,max){for(let i=min*4;i<=max*4;i++){const value=i/4,label=scText(value),option=document.createElement('option');option.value=label;option.textContent=label;select.appendChild(option)}}fillQuarterOptions(scS,-5,5);fillQuarterOptions(scC,-10,10);
function limitCylinderOptions(S){const min=Math.max(-10,-5-S),max=Math.min(10,5-S);[...scC.options].forEach(option=>{const value=Number(option.value);option.disabled=value<min-.001||value>max+.001});const current=Number(scC.value);if(current<min||current>max)scC.value=scText(Math.max(min,Math.min(max,current)))}
function syncScax(hd,vd){if(scaxAxis==='180'){scS.value=scText(vd);scC.value=scText(hd-vd)}else{scS.value=scText(hd);scC.value=scText(vd-hd)}scA.value=scaxAxis;limitCylinderOptions(Number(scS.value))}
function render(){const {hd:baseH,vd:baseV}=vals(),lensH=lensS+(baseH<=baseV?lensC:0),lensV=lensS+(baseV<baseH?lensC:0),eyeC=scaxAxis==='180'?baseH-baseV:baseV-baseH,jccApplied=jcc*(eyeC>0?-1:1),jccH=scaxAxis==='180'?jccApplied:-jccApplied,jccV=-jccH,jccRotation=(scaxAxis==='180'?0:90)+(jccApplied>0?0:90),hd=baseH-lensH+jccH,vd=baseV-lensV+jccV,hx=xFor(hd),vx=xFor(vd);trialLens.setAttribute("visibility",lensS===0&&lensC===0&&jcc===0?"hidden":"visible");jccLens.setAttribute("opacity",jcc===0?"0":"1");jccLens.setAttribute("transform",`translate(132 205) rotate(${jccRotation})`);jccFront.setAttribute("visibility",jcc===0?"hidden":"visible");jccFront.setAttribute("transform",`translate(60 205) rotate(${jccRotation})`);jccLensHandle.setAttribute("transform",`rotate(${-jccRotation})`);jccFrontHandle.setAttribute("transform",`rotate(${-jccRotation})`);H.setAttribute("transform",`translate(${hx} 205)`);V.setAttribute('transform',`translate(${vx} 205)`);least.setAttribute('transform',`translate(${(hx+vx)/2} 205)`);const focusAligned=Math.abs(hd-vd)<.001,retinalFocusAligned=focusAligned&&Math.abs(hd)<.001;least.querySelector('circle').classList.toggle('aligned',focusAligned);H.classList.toggle('aligned',focusAligned);V.classList.toggle('aligned',focusAligned);retinalFocus.setAttribute('visibility',retinalFocusAligned?'visible':'hidden');retinalFocus.setAttribute('transform','translate('+retinaX+' 205)');document.querySelector('#hOut').value=dText(hd);document.querySelector('#vOut').value=dText(vd);document.querySelector('#sOut').value=dText(+s.value);jccOut.style.opacity=jcc===0?".28":"1";const redHorizontal=jccRotation%180===0;jccMiniH.setAttribute("stroke",redHorizontal?"#df3a35":"#fff");jccMiniV.setAttribute("stroke",redHorizontal?"#fff":"#df3a35");syncScax(baseH,baseV);correctionOut.textContent=`S ${scText(lensS)} D / C ${scText(lensC)} D / AX ${scaxAxis}°`}
[h,v,s].forEach(e=>e.addEventListener('input',render));document.querySelectorAll('button[data-target]').forEach(b=>b.addEventListener('click',()=>{const r=b.dataset.target==='h'?h:b.dataset.target==='v'?v:s;r.value=Math.max(+r.min,Math.min(+r.max,+r.value+(+b.dataset.step)));render()}));
document.querySelector('#jccOne').addEventListener('click',()=>{jcc=-Number(jccPower.value);render()});document.querySelector('#jccTwo').addEventListener('click',()=>{jcc=Number(jccPower.value);render()});document.querySelector('#jccClear').addEventListener('click',()=>{jcc=0;render()});jccPower.addEventListener('change',()=>{if(jcc!==0)jcc=Math.sign(jcc)*Number(jccPower.value);render()});
jccToggle.addEventListener('click',()=>{jccPanel.hidden=!jccPanel.hidden;jccToggle.textContent=jccPanel.hidden?'補正レンズシミュレーションを表示':'補正レンズシミュレーションを隠す'});directToggle.addEventListener('click',()=>{directControls.hidden=!directControls.hidden;directToggle.textContent=directControls.hidden?'焦線を直接調整':'直接調整を閉じる'});
document.querySelector('#resetJccPractice').addEventListener('click',()=>{lensS=0;lensC=0;jcc=0;render()});
function applyScax(){const S=quarter(Number(scS.value));if(!Number.isFinite(S))return;limitCylinderOptions(S);const C=quarter(Number(scC.value));if(!Number.isFinite(C))return;scaxAxis=scA.value;scS.value=scText(S);scC.value=scText(C);const hd=scaxAxis==='180'?S+C:S,vd=scaxAxis==='180'?S:S+C;h.value=-hd;v.value=-vd;s.value=0;render()}[scS,scC,scA].forEach(input=>input.addEventListener('change',applyScax));
document.querySelectorAll('[data-scax-step]').forEach(button=>button.addEventListener('click',()=>{const select=document.querySelector(`#${button.dataset.scaxSelect}`),step=Number(button.dataset.scaxStep),min=Number(select.options[0].value),max=Number(select.options[select.options.length-1].value),next=Math.max(min,Math.min(max,quarter(Number(select.value)+step)));select.value=scText(next);applyScax()}));
document.querySelectorAll('[data-lens-step]').forEach(button=>button.addEventListener('click',()=>{const step=Number(button.dataset.lensStep);if(button.dataset.lensTarget==='S')lensS=quarter(lensS+step);else lensC=quarter(lensC+step);jcc=0;render()}));
document.querySelector('#transposeScax').addEventListener('click',()=>{const S=quarter(Number(scS.value)),C=quarter(Number(scC.value));if(!Number.isFinite(S)||!Number.isFinite(C))return;scS.value=scText(quarter(S+C));scC.value=scText(quarter(-C));scA.value=scA.value==='180'?'90':'180';applyScax()});
document.querySelector('#resetEmmetropia').addEventListener('click',()=>{scS.value='0.00';scC.value='0.00';scA.value='180';scaxAxis='180';h.value=0;v.value=0;s.value=0;jcc=0;lensS=0;lensC=0;render()});
function applyZoom(){const z=+zoom.value;if(z===1){svg.setAttribute('viewBox','0 0 760 430')}else{const w=760/z,ht=430/z;svg.setAttribute('viewBox',`${605-w/2} ${230-ht/2} ${w} ${ht}`)}document.querySelector('#zoomOut').value=`×${z.toFixed(1)}`};zoom.addEventListener('input',applyZoom);
function begin(e,target){dragging=target;e.preventDefault()}function move(e){if(!dragging)return;const box=svg.getBoundingClientRect(),view=svg.viewBox.baseVal,x=view.x+(e.clientX-box.left)*view.width/box.width,wanted=Math.max(-5,Math.min(5,Math.round(((x-retinaX)/scale)*4)/4)),offset=+s.value;(dragging==='h'?h:v).value=Math.max(-5,Math.min(5,-wanted-offset));render()}H.addEventListener('pointerdown',e=>begin(e,'h'));V.addEventListener('pointerdown',e=>begin(e,'v'));window.addEventListener('pointermove',move);window.addEventListener('pointerup',()=>dragging=null);makeTicks();applyZoom();render();
if('serviceWorker' in navigator&&location.protocol!=='file:'){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}
</script></body></html>
